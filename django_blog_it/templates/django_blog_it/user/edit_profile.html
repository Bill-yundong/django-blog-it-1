{% extends 'django_blog_it/base.html' %}

{% block title %}编辑个人资料 - Django Blog{% endblock %}

{% block content %}
<div class="edit-profile-page">
    <h1 class="page-title">编辑个人资料</h1>
    
    <form method="post" enctype="multipart/form-data" class="edit-form card">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="avatar">头像</label>
            <div class="avatar-preview">
                {% if profile.avatar %}
                <img src="{{ profile.avatar.url }}" alt="当前头像">
                {% else %}
                <div class="avatar-placeholder">
                    <i class="fas fa-user"></i>
                </div>
                {% endif %}
            </div>
            <input type="file" id="avatar" name="avatar" accept="image/*">
        </div>
        
        <div class="form-group">
            <label for="bio">个人简介</label>
            <textarea id="bio" name="bio" rows="4" placeholder="介绍一下自己...">{{ profile.bio }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="location">所在地</label>
            <input type="text" id="location" name="location" value="{{ profile.location }}" placeholder="例如：北京">
        </div>
        
        <div class="form-group">
            <label for="website">个人网站</label>
            <input type="url" id="website" name="website" value="{{ profile.website }}" placeholder="https://example.com">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存更改</button>
            <a href="{% url 'django_blog_it:user_profile' username=user.username %}" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_css %}
<style>
.edit-profile-page {
    max-width: 600px;
    margin: 0 auto;
}

.page-title {
    font-size: 2rem;
    margin-bottom: 2rem;
    text-align: center;
}

.edit-form {
    padding: 2rem;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: #2c3e50;
}

.form-group input[type="text"],
.form-group input[type="url"],
.form-group textarea {
    width: 100%;
    padding: 0.75rem;
    border: 2px solid #ecf0f1;
    border-radius: 8px;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #3498db;
}

.avatar-preview {
    margin-bottom: 1rem;
}

.avatar-preview img,
.avatar-preview .avatar-placeholder {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
}

.avatar-placeholder {
    background: #ecf0f1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: #95a5a6;
}

.form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
}
</style>
{% endblock %}
